<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f3f3f3;
            user-select: none;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        h2 { margin-top: 0; font-size: 18px; color: #333; }
        .buttons { display: flex; gap: 10px; margin-top: 20px; }
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            background-color: #0078d4;
            color: white;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        button:hover { background-color: #005a9e; }
        button.secondary { background-color: #e5e5e5; color: #333; }
        button.secondary:hover { background-color: #d5d5d5; }
    </style>
</head>
<body>
    <h2>Where would you like to save this file?</h2>
    <div class="buttons">
        <button onclick="choose('downloads')">Downloads</button>
        <button onclick="choose('other')">Other</button>
        <button class="secondary" onclick="cancel()">Cancel</button>
    </div>
    <script>
        const { ipcRenderer } = require('electron');
        function choose(choice) {
            ipcRenderer.send('download-choice', choice);
        }
        function cancel() {
            ipcRenderer.send('download-cancel');
        }
    </script>
</body>
</html>
