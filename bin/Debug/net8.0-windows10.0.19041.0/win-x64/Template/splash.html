<!DOCTYPE html>
<html>
<head>
    <style>
        :root { --bg-color: #ffffff; --accent-color: #0078d4; --text-color: #333333; }
        
        body { 
            margin: 0; padding: 0; height: 100vh; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; font-family: 'Segoe UI', Tahoma, sans-serif;
            overflow: hidden; background-color: var(--bg-color); color: var(--text-color);
        }

        .container { 
            text-align: center; z-index: 10;
            animation: fadeIn 0.8s ease-out;
        }

        .logo { 
            width: 120px; height: 120px; margin-bottom: 24px; object-fit: contain;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.1));
        }

        .name { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; opacity: 0; }

        /* Template Styles */
        .template-modern .name { animation: slideUpFade 0.6s ease-out 0.3s forwards; }
        .template-modern .logo { animation: pulse 3s infinite ease-in-out; }

        .template-glass .container {
            background: rgba(255, 255, 255, 0.1); padding: 40px; border-radius: 24px;
            backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .template-gradient body {
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%; animation: gradientBG 15s ease infinite;
        }

        .template-reveal .logo { animation: revealIcon 1s forwards; }
        .template-reveal .name { animation: revealText 1s 0.5s forwards; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUpFade { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        @keyframes revealIcon { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }
        @keyframes revealText { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }

        .loader { width: 48px; height: 6px; background: rgba(0,0,0,0.1); border-radius: 3px; margin: 24px auto 0; overflow: hidden; position: relative; }
        .loader-bar { position: absolute; width: 40%; height: 100%; background: var(--text-color); border-radius: 3px; animation: loadingMove 1.5s infinite ease-in-out; }
        @keyframes loadingMove { from { left: -40%; } to { left: 100%; } }
    </style>
</head>
<body class="template-modern">
    <div class="container">
        <img id="splashLogo" class="logo" src="icon.png" />
        <div id="splashName" class="name">Loading...</div>
        <div class="loader"><div class="loader-bar"></div></div>
    </div>
    <script>
        const { ipcRenderer } = require('electron');
        const config = ipcRenderer.sendSync('get-config');
        
        document.getElementById('splashName').innerText = config.appName;
        document.body.className = 'template-' + (config.splashTemplate || 'modern');

        const bgColor = config.splashColor || "#ffffff";
        const textColor = config.splashTextColor || "#333333";
        
        document.documentElement.style.setProperty('--bg-color', bgColor);
        document.documentElement.style.setProperty('--text-color', textColor);
    </script>
</body>
</html>
